version: 1.0
frontend:
    phases:
        preBuild:
            commands:
                - export NVM_DIR="$HOME/.nvm"
                - . "$NVM_DIR/nvm.sh"
                - nvm install --no-progress 20
                - nvm use 20
                - export CI=true
                - export CYPRESS_INSTALL_BINARY=0
                - export GATSBY_TELEMETRY_DISABLED=1
                - npm ci --no-audit --no-fund
        build:
            commands:
                - npm run build
    artifacts:
        baseDirectory: public
        files:
            - '**/*'
    cache:
        paths:
            - $HOME/.npm/**/*
